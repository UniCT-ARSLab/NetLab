<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5f5f68"/>
      <stop offset="100%" stop-color="#1f1f23"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="216" fill="url(#bg)"/>

  <!-- network topology glyph: switch node in the middle, three endpoints around it.
       Bold strokes and solid dots (no inner holes) so the mark stays readable
       once downscaled to 16-32px for the taskbar/file icon. -->
  <g filter="url(#shadow)" stroke="#ffffff" stroke-width="46" stroke-linecap="round" fill="none">
    <line x1="512" y1="512" x2="512" y2="290"/>
    <line x1="512" y1="512" x2="310" y2="650"/>
    <line x1="512" y1="512" x2="714" y2="650"/>
  </g>

  <g filter="url(#shadow)" fill="#ffffff">
    <circle cx="512" cy="512" r="112"/>
    <circle cx="512" cy="290" r="78"/>
    <circle cx="310" cy="650" r="78"/>
    <circle cx="714" cy="650" r="78"/>
  </g>
</svg>
</body>
</html>
