<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5f5f68"/>
      <stop offset="100%" stop-color="#1f1f23"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="216" fill="url(#bg)"/>

  <!-- network topology glyph: switch node in the middle, three endpoints around it -->
  <g filter="url(#shadow)" stroke="#ffffff" stroke-width="26" stroke-linecap="round" fill="none">
    <line x1="512" y1="512" x2="512" y2="300"/>
    <line x1="512" y1="512" x2="322" y2="640"/>
    <line x1="512" y1="512" x2="702" y2="640"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="92" fill="#ffffff"/>
    <circle cx="512" cy="300" r="62" fill="#ffffff"/>
    <circle cx="322" cy="640" r="62" fill="#ffffff"/>
    <circle cx="702" cy="640" r="62" fill="#ffffff"/>
  </g>

  <g fill="#18181b">
    <circle cx="512" cy="512" r="34"/>
    <circle cx="512" cy="300" r="22"/>
    <circle cx="322" cy="640" r="22"/>
    <circle cx="702" cy="640" r="22"/>
  </g>
</svg>
</body>
</html>
