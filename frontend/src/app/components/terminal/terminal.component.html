<div class="term-bar">
  @if (platform === 'darwin') {
    <div class="term-mac-spacer"></div>
  }
  <div class="term-bar__title">
    <i class="pi pi-terminal"></i>
    <span>{{ node.name }}</span>
  </div>
  <button class="term-bar__close" (click)="onClose()" [title]="'terminal.close-title' | translate">✕</button>
</div>

<div #terminalEl class="term-xterm"></div>

@if (stopping() || sessionEnded()) {
  <div class="term-overlay">
    @if (stopping() && !sessionEnded()) {
      <i class="pi pi-spinner pi-spin term-overlay__icon term-overlay__icon--stopping"></i>
      <span class="term-overlay__label">{{ 'terminal.stopping' | translate }}</span>
    } @else {
      <i class="pi pi-stop-circle term-overlay__icon term-overlay__icon--ended"></i>
      <span class="term-overlay__label">{{ 'terminal.session-ended' | translate }}</span>
    }
  </div>
}
